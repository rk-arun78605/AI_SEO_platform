name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build & Lint ────────────────────────────────────────────────
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          GOOGLE_SERVICE_ACCOUNT_EMAIL: placeholder@example.iam.gserviceaccount.com
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: placeholder
          GOOGLE_PAGESPEED_API_KEY: placeholder
          NEXT_PUBLIC_DEFAULT_SITE_URL: https://indraseo.com

  # ── Deploy to Vercel (main branch only) ────────────────────────
  deploy-vercel:
    name: Deploy to Vercel
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Trigger Namecheap cPanel Git Pull (main branch only) ───────
  deploy-namecheap:
    name: Deploy to Namecheap
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger cPanel Git pull & build
        run: |
          curl -s -X POST "${{ secrets.CPANEL_DEPLOY_WEBHOOK_URL }}" || true
