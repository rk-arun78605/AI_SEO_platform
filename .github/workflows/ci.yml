name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build & Lint ────────────────────────────────────────────────
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Provide placeholder values so build doesn't fail on missing env vars.
          # Real secrets are only needed at runtime (Vercel / your server).
          GOOGLE_SERVICE_ACCOUNT_EMAIL: placeholder@example.iam.gserviceaccount.com
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: placeholder
          GOOGLE_PAGESPEED_API_KEY: placeholder
          NEXT_PUBLIC_DEFAULT_SITE_URL: https://example.com

  # ── Deploy to Vercel (main branch only) ────────────────────────
  deploy:
    name: Deploy to Vercel
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on a real push to main (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy (Vercel)
        run: npx vercel --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
