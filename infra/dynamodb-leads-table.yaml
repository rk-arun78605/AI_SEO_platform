AWSTemplateFormatVersion: "2010-09-09"
Description: Indra SEO free-audit leads table

Resources:
  IndraSeoLeadsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: indra-seo-leads
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

Outputs:
  LeadsTableName:
    Value: !Ref IndraSeoLeadsTable
    Description: DynamoDB table name for free-audit leads
