AWSTemplateFormatVersion: "2010-09-09"
Description: Indra SEO model feedback table for continual ML improvement

Resources:
  IndraSeoModelFeedbackTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: indra-seo-model-feedback
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

Outputs:
  ModelFeedbackTableName:
    Value: !Ref IndraSeoModelFeedbackTable
    Description: DynamoDB table name for ML feedback capture
